<!DOCTYPE html>
<html>
<head>
    <title class="title">ქართული სამზარეულო</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<nav class="navbar navbar-dark custom-navbar">
    <div class="container">

        <a href="/" class="navbar-brand d-flex align-items-center">
            <img src="https://cdn.dribbble.com/userupload/20806714/file/original-0c1d80ae35461ac8296981a34bd48fce.jpg"
                 class="logo">
            ქართული სამზარეულო
        </a>

        <div>
            {% if session.get('admin') %}
                <a href="/product/create" class="btn btn-success btn-sm">დამატება</a>
                <a href="/logout" class="btn btn-danger btn-sm">გამოსვლა</a>
            {% else %}
                <a href="/login" class="btn btn-dark w-100">ადმინისტრატორი</a>
            {% endif %}
        </div>

    </div>
</nav>

<div class="bg-overlay"></div>

<div class="container mt-4">
    {% block content %}{% endblock %}
</div>

<script>
function add(id){
    fetch("/add/" + id).then(()=>location.reload());
}
</script>

</body>
</html>
