{% extends 'base.html' %}

{% block content %}
<div class="container d-flex justify-content-center align-items-center" style="min-height: 70vh;">
    <div class="card p-4 shadow-sm" style="width: 100%; max-width: 400px; border-radius: 12px;">
        
        <h3 class="text-center mb-4" style="font-family: 'DM Constitution', sans-serif;">შესვლა</h3>

        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-danger text-center p-2">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST">
            <div class="mb-3">
                <label class="form-label text-muted small">მომხმარებელი</label>
                <input type="text" class="form-control" name="username" placeholder="e.g. admin" required>
            </div>
            
            <div class="mb-4">
                <label class="form-label text-muted small">პაროლი</label>
                <input type="password" class="form-control" name="password" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn btn-dark w-100 py-2">შესვლა</button>
        </form>

    </div>
</div>
{% endblock %}
